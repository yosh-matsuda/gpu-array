            gpu_arch: "90"
    name: Ubuntu - ${{ matrix.name }}
    runs-on: ubuntu-24.04
    continue-on-error: ${{ matrix.experimental == true }}

    env:
      triplet: x64-linux

    steps:
      - uses: actions/checkout@v6
        with:
          submodules: true

      - name: Install CUDA
        if: ${{ matrix.backend == 'cuda' }}
        uses: Jimver/cuda-toolkit@master
        id: cuda-toolkit
        with:
          cuda: ${{ matrix.version }}
          sub-packages: '["nvcc"]'
          method: "network"

      - name: Install CUDA for HIP NVIDIA
        if: ${{ matrix.backend == 'hip' && matrix.hip_platform == 'nvidia' }}
        uses: Jimver/cuda-toolkit@master
        id: cuda-toolkit-hip-nvidia
        with:
          cuda: ${{ matrix.cuda_version }}
          sub-packages: '["nvcc", "profiler-api"]'
          method: "network"

      - name: Install ROCm
        if: ${{ matrix.backend == 'hip' }}
        uses: loostrum/rocm-installer@v0.2
        with:
          version: ${{ matrix.version }}

      - name: Install compilers
        shell: bash
        run: |
          eval "$(/home/linuxbrew/.linuxbrew/bin/brew shellenv)"
          brew install ninja ${{ matrix.compiler_package }}

      - name: Show toolchain versions
        shell: bash
        run: |
          eval "$(/home/linuxbrew/.linuxbrew/bin/brew shellenv)"
          ${{ matrix.c }} --version
          ${{ matrix.cxx }} --version
          if [[ "${{ matrix.backend }}" == "cuda" || "${{ matrix.hip_platform }}" == "nvidia" ]]; then
            nvcc --version
          fi
          if [[ "${{ matrix.backend }}" == "hip" ]]; then
            hipcc --version
            /opt/rocm/lib/llvm/bin/clang++ --version
          fi

      - name: Install dependencies
        shell: bash
        run: |
          eval "$(/home/linuxbrew/.linuxbrew/bin/brew shellenv)"
          for attempt in 1 2 3; do
            if CC=${{ matrix.c }} CXX=${{ matrix.cxx }} vcpkg install --triplet ${{ env.triplet }}; then
              exit 0
            fi

            if [[ "${attempt}" == "3" ]]; then
              exit 1
            fi

            echo "vcpkg install failed; retrying (${attempt}/3)."
            sleep 30
          done

      - name: Build
        shell: bash
        run: |
          eval "$(/home/linuxbrew/.linuxbrew/bin/brew shellenv)"
          rm -rf ${{ github.workspace }}/build

          cmake_args=(
            -S ${{ github.workspace }}
            -B ${{ github.workspace }}/build
            -DCMAKE_TOOLCHAIN_FILE=$VCPKG_INSTALLATION_ROOT/scripts/buildsystems/vcpkg.cmake
            -DVCPKG_TARGET_TRIPLET=${{ env.triplet }}
            -DCMAKE_C_COMPILER=${{ matrix.c }}
            -DCMAKE_CXX_COMPILER=${{ matrix.cxx }}
            -DENABLE_HIP=${{ matrix.enable_hip }}
            -G "Ninja Multi-Config"
          )

          if [[ "${{ matrix.backend }}" == "cuda" ]]; then
            cmake_args+=(
              -DCMAKE_CUDA_ARCHITECTURES=${{ matrix.gpu_arch }}
            )
          else
            cmake_args+=(
              -DCMAKE_HIP_PLATFORM=${{ matrix.hip_platform }}
              -DCMAKE_HIP_ARCHITECTURES=${{ matrix.gpu_arch }}
              -DCMAKE_PREFIX_PATH=/opt/rocm
            )
          fi

          cmake "${cmake_args[@]}"
          cmake --build ${{ github.workspace }}/build --config Debug --clean-first
          cmake --build ${{ github.workspace }}/build --config Release --clean-first
          # GitHub-hosted runners do not provide GPUs, so this workflow is build-only.
          # Run ctest on a local or self-hosted GPU runner.
