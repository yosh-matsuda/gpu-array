name: Tests

on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - main
    tags:
      - "v*"

concurrency:
  group: test-${{ github.ref }}
  cancel-in-progress: false

jobs:
  ubuntu-build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: CUDA 12.6.3 / GCC 13
            backend: cuda
            version: "12.6.3"
            enable_hip: "OFF"
            compiler_package: gcc@13
            c: /home/linuxbrew/.linuxbrew/bin/gcc-13
            cxx: /home/linuxbrew/.linuxbrew/bin/g++-13
            gpu_arch: "90"
          - name: CUDA 12.6.3 / Clang 16
            backend: cuda
            version: "12.6.3"
            enable_hip: "OFF"
            compiler_package: llvm@16
            c: /home/linuxbrew/.linuxbrew/opt/llvm@16/bin/clang
            cxx: /home/linuxbrew/.linuxbrew/opt/llvm@16/bin/clang++
            gpu_arch: "90"
